displayName=Fate Locked Ironman
author=Nubles
description=Companion plugin for the Fate Locked Ironman chunk-locked tracker. Renders your authored chunks on the world map, minimap and game scene, and warns — by menu tag, chat, sound, screen flash and optional notification — before you enter or teleport into a locked chunk, equip gear above your unlocked tier, or take a slayer task in a locked area. Also shows what's in your current chunk, your unlock progress and run state, and reminds you when a level-up, quest or diary may be worth a roll.
tags=chunk,ironman,chunkman,locked,map,region,fate
plugins=com.fatelocked.FateLockedPlugin
build=standard
